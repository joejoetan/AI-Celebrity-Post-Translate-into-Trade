name: scrape

on:
  schedule:
    # every 5 minutes (GitHub cron is best-effort — can be delayed under load)
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      CLAUDE_MODEL: claude-opus-4-7
      STATE_DIR: state
      MIN_CONVICTION: "0.35"
      LOOKBACK_HOURS: "1"
      AUTO_PROMOTE: "false"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout state branch
        uses: actions/checkout@v4
        with:
          ref: bot-state
          path: _state
          # Don't fail on first run when the branch doesn't exist yet.
          fetch-depth: 1
        continue-on-error: true

      - name: Seed state dir
        run: |
          mkdir -p state
          if [ -d _state/state ]; then
            cp -r _state/state/* state/ 2>/dev/null || true
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        run: python -m src.main

      - name: Commit state
        run: |
          set -euo pipefail
          if [ ! -d _state/.git ]; then
            # First run — initialize the orphan branch.
            git init _state
            cd _state
            git checkout --orphan bot-state
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          else
            cd _state
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          mkdir -p state
          cp -r ../state/* state/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            git commit -m "state: update $(date -u +%FT%TZ)"
            git push origin HEAD:bot-state
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
